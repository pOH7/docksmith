name: Sync PeerBanHelper

on:
  schedule:
    - cron: '0 18 * * *'  # Daily at 2 AM UTC+8 (18:00 UTC)
  workflow_dispatch:

jobs:
  sync:
    uses: ./.github/workflows/sync-multi-template.yml
    with:
      config: |
        {
          "version_key": "PBH-BTN/PeerBanHelper",
          "source_repo": "PBH-BTN/PeerBanHelper",
          "sync_type": "release",
          "components": [
            {
              "type": "image",
              "images": ["ghostchu/peerbanhelper"],
              "target_image_name": "peerbanhelper"
            }
          ]
        }
    secrets: inherit
